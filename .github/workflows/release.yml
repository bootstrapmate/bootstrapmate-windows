# BootstrapMate Windows â€” Tag-triggered release (MSI + zip per arch)
#
# Triggers:
#   - Tag v* â†’ full release with MSI + zips, GitHub Release published
# CI builds on push/PR live in ci.yml.

name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: 'America/Vancouver'
  TZ: 'America/Vancouver'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props') }}

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $full = $tag -replace '^v',''
          if ($full -match '^(\d+)\.(\d+)\.(\d+)\.(\d+)$') {
            $msi = "$([int]$Matches[1] - 2000).$([int]$Matches[2]).$([int]$Matches[3]).$($Matches[4])"
          } else {
            $msi = $full
          }
          "full=$full" | Out-File -Append $env:GITHUB_OUTPUT
          "msi=$msi"   | Out-File -Append $env:GITHUB_OUTPUT

      - name: Build CLI (installapplications.exe)
        run: >
          dotnet publish BootstrapMate.csproj
          --configuration Release
          --runtime win-${{ matrix.arch }}
          --output publish/executables/${{ matrix.arch }}
          --self-contained true
          --verbosity minimal

      - name: Build GUI App (BootstrapMate.exe)
        run: >
          dotnet publish src/BootstrapMate.App/BootstrapMate.App.csproj
          --configuration Release
          --runtime win-${{ matrix.arch }}
          --output publish/app/${{ matrix.arch }}
          --self-contained true
          --verbosity minimal

      - name: Generate resources.pri
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $outputDir = (Resolve-Path "publish/app/$arch").Path
          $appProjectDir = Join-Path $PWD "src/BootstrapMate.App"

          $makepri = $null
          $sdkBinRoots = @(
            "$env:ProgramFiles\Windows Kits\10\bin",
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          ) | Where-Object { Test-Path $_ }
          foreach ($root in $sdkBinRoots) {
            foreach ($toolArch in @("x64", "arm64", "x86")) {
              $hit = Get-ChildItem "$root\*\$toolArch\makepri.exe" -ErrorAction SilentlyContinue |
                Sort-Object { [version]($_.FullName -replace '.*\\(\d+\.\d+\.\d+\.\d+)\\.*','$1') } -Descending |
                Select-Object -First 1
              if ($hit) { $makepri = $hit.FullName; break }
            }
            if ($makepri) { break }
          }
          if (-not $makepri) {
            Write-Host "::warning::makepri.exe not found â€” skipping resources.pri generation"
            exit 0
          }

          $xbfFiles = Get-ChildItem "$appProjectDir\obj\Release" -Recurse -Filter "*.xbf" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match [regex]::Escape("\win-$arch\") }
          if (-not $xbfFiles) {
            Write-Host "::warning::No XBF files found â€” skipping resources.pri"
            exit 0
          }

          $xbfRootPath = ($xbfFiles[0].FullName -split [regex]::Escape("\win-$arch\"))[0] + "\win-$arch"
          $stagingDir = Join-Path ([System.IO.Path]::GetTempPath()) "bootstrapmate-pri-$arch"
          if (Test-Path $stagingDir) { Remove-Item $stagingDir -Recurse -Force }
          New-Item -ItemType Directory $stagingDir -Force | Out-Null

          foreach ($xbf in $xbfFiles) {
            $rel = $xbf.FullName.Substring($xbfRootPath.Length).TrimStart('\')
            $stageDest = Join-Path $stagingDir $rel
            $stageDestDir = Split-Path $stageDest
            if (-not (Test-Path $stageDestDir)) { New-Item -ItemType Directory $stageDestDir -Force | Out-Null }
            Copy-Item $xbf.FullName $stageDest -Force
            $outDest = Join-Path $outputDir $rel
            $outDestDir = Split-Path $outDest
            if (-not (Test-Path $outDestDir)) { New-Item -ItemType Directory $outDestDir -Force | Out-Null }
            Copy-Item $xbf.FullName $outDest -Force
          }

          Get-ChildItem $outputDir -Filter "Microsoft.*.pri" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName (Join-Path $stagingDir $_.Name) -Force
          }

          $priconfigPath = Join-Path $stagingDir "priconfig.xml"
          & $makepri createconfig /cf $priconfigPath /dq "en-US" /pv "10.0.0" /o 2>&1 | Out-Null

          $priOutput = Join-Path $outputDir "resources.pri"
          $result = & $makepri new /pr $stagingDir /cf $priconfigPath /in "BootstrapMate" /of $priOutput /o 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::makepri.exe failed (exit $LASTEXITCODE): $result"
            exit 1
          }
          Remove-Item $stagingDir -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build MSI
        shell: pwsh
        run: |
          $binDir = (Resolve-Path "publish/executables/${{ matrix.arch }}").Path
          $appDir = (Resolve-Path "publish/app/${{ matrix.arch }}").Path
          $dotnetArgs = @(
            "build", "installer/BootstrapMate.Installer.wixproj",
            "--configuration", "Release",
            "--verbosity", "detailed",
            "-p:Platform=${{ matrix.arch }}",
            "-p:ProductVersion=${{ steps.version.outputs.msi }}",
            "-p:BinDir=$binDir",
            "-p:AppDir=$appDir"
          )
          dotnet @dotnetArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.full }}"
          $arch    = "${{ matrix.arch }}"
          $staging = "staging"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          $msi = Get-ChildItem "installer/bin" -Filter "*.msi" -Recurse | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "$staging/BootstrapMate-$arch-$version.msi"
          }

          $zipDir = Join-Path $env:RUNNER_TEMP "zip-$arch"
          New-Item -ItemType Directory -Path $zipDir -Force | Out-Null
          Copy-Item "publish/executables/$arch/installapplications.exe" $zipDir/
          if (Test-Path "publish/app/$arch/BootstrapMate.exe") {
            Copy-Item "publish/app/$arch/*" $zipDir/ -Recurse
          }
          Compress-Archive -Path "$zipDir/*" -DestinationPath "$staging/BootstrapMate-$arch-$version.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootstrapmate-${{ matrix.arch }}
          path: staging/*
          retention-days: 14

  release:
    name: Create Release
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem -Path artifacts -Recurse -File | Select-Object FullName, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}}

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.ref_name }}'
          $title = "BootstrapMate for Windows $tag"
          $dotnet = (dotnet --version).Trim()
          $os = (Get-CimInstance Win32_OperatingSystem).Caption.Trim()
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"

          $buildInfo = @"
          ## Build info

          This release was built with .NET SDK $dotnet on $os, via a GitHub Actions workflow here: $runUrl. It is provided **unsigned** â€” see signing instructions at the bottom.
          "@

          $signing = @"
          ## Signing for enterprise deployment

          Sign the MSIs with your organization's code signing certificate before distribution:

          ``````powershell
          `$cert = "Your Certificate Name"
          `$timestampUrl = "http://timestamp.digicert.com"

          Get-ChildItem -Filter "BootstrapMate-*.msi" | ForEach-Object {
              signtool sign /fd SHA256 /tr `$timestampUrl /td SHA256 /n `$cert `$_.FullName
          }
          ``````

          ## Deployment

          Deploy the signed MSI via Intune or any standard MDM tool. Registry-based detection rule:
          ``HKLM:\SOFTWARE\BootstrapMate`` â†’ ``Version`` equals ``$tag``

          Built from commit ``$env:GITHUB_SHA``.
          "@

          $autoNotes = (gh api -X POST "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" -f tag_name=$tag --jq .body) -join "`n"
          $notes = "$buildInfo`n`n$autoNotes`n`n$signing"

          $artifacts = Get-ChildItem -Path artifacts -Recurse -File | ForEach-Object { $_.FullName }
          if ($artifacts.Count -eq 0) { throw 'No artifacts to upload' }
          gh release create $tag @artifacts --title $title --notes $notes
